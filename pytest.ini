[pytest]
addopts = 
    --html=reports/report.html 
    --self-contained-html
markers =
    smoke: fast, critical path tests
    regression: full regression suite
    ui: Selenium UI tests
    api: REST API tests

[coverage:run]
omit =
    conftest.py
    */site-packages/*
 
[coverage:report]
show_missing = true
skip_empty = true